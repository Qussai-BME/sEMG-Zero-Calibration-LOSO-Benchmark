# db3_to_db7_movement_map — ANATOMICALLY VERIFIED
# Sources:
#   - Atzori et al. (2014): "Electromyography data for non-invasive naturally-
#     controlled robotic hand prostheses." Scientific Data 1:140053.
#   - Krasoulis et al. (2017): "Improved prosthetic hand control with concurrent
#     use of myoelectric and inertial measurements." J. NeuroEng. Rehab.
#   - Sri-iesaranusorn et al. (2021): "Classification of 41 Hand and Wrist
#     Movements via sEMG using DNN." Front. Bioeng. Biotechnol. 9:548357.
#   - PMC6515272, PMC9682172 (Exercise B movement descriptions)
#
# Verified structural fact:
#   DB3 Exercise B (labels 1-17)  = DB7 movements 1-17  (identical protocol)
#   DB3 Exercise C (labels 18-40) = DB7 movements 18-40 (identical protocol)
#   DB3 Exercise D (labels 41-49) = NO DB7 equivalent   → silently EXCLUDED
#
# The mapping is 1:1 because DB3 and DB7 share the same official NinaPro
# Exercise B + C protocol. Both databases were recorded using identical
# movement instruction videos from the same taxonomy (Atzori 2012).
#
# Combined amputee analysis result after this fix:
#   Subjects:  11 (DB3) + 2 (DB7 amputees) = 13 total
#   Movements: 40 shared classes (vs. 24 in the broken mapping)
#   Data used: 81.6% of DB3 gesture space (Exercise D excluded — correct)
# =============================================================================
 
db3_to_db7_movement_map:
 
  # ── EXERCISE B: Isometric/Isotonic Configurations + Wrist Movements ──────
  # DB3 raw file restimulus 1-17, after offset=0 → final label 1-17
  # DB7 restimulus 1-17 (no offset, single exercise file)
 
  1: 1    # Thumb up
  2: 2    # Extension of index+middle, flexion of others
  3: 3    # Flexion of ring+little, extension of others
  4: 4    # Thumb opposing base of little finger
  5: 5    # Abduction of all fingers
  6: 6    # Fingers flexed together (fist)
  7: 7    # Pointing index
  8: 8    # Adduction of extended fingers
  9: 9    # Wrist supination, axis: middle finger
  10: 10  # Wrist pronation, axis: middle finger
  11: 11  # Wrist supination, axis: little finger
  12: 12  # Wrist pronation, axis: little finger
  13: 13  # Wrist flexion
  14: 14  # Wrist extension
  15: 15  # Wrist radial deviation
  16: 16  # Wrist ulnar deviation
  17: 17  # Wrist extension, hand closed
 
  # ── EXERCISE C: Grasping and Functional Movements ─────────────────────────
  # DB3 raw file restimulus 1-23, after offset=17 → final label 18-40
  # DB7 restimulus 18-40 (same order)
 
  18: 18  # Large diameter grasp
  19: 19  # Small diameter grasp
  20: 20  # Fixed hook grasp
  21: 21  # Index finger extension grasp
  22: 22  # Medium wrap
  23: 23  # Ring grasp
  24: 24  # Prismatic four fingers grasp
  25: 25  # Stick grasp                    
  26: 26  # Writing tripod grasp             
  27: 27  # Power sphere grasp               
  28: 28  # Three finger sphere grasp        
  29: 29  # Precision sphere grasp           
  30: 30  # Tripod grasp                     
  31: 31  # Prismatic pinch grasp            
  32: 32  # Tip pinch grasp                  
  33: 33  # Quadrupod grasp                  
  34: 34  # Lateral pinch grasp              
  35: 35  # Parallel extension grasp         
  36: 36  # Extension type grasp             
  37: 37  # Power disk grasp                 
  38: 38  # Open a bottle with tripod grasp   
  39: 39  # Turn a screw (counterclockwise)   
  40: 40  # Cut something with scissors      
 
  # ── EXERCISE D: Force Measurements — INTENTIONALLY EXCLUDED ──────────────
  # DB3 raw file restimulus 1-9, after offset=40 → final labels 41-49
  # DB7 has NO Exercise D equivalent. 

  # 41: NO MATCH  — Thumb flexion (force-only)
  # 42: NO MATCH  — Index finger flexion (force-only)
  # 43: NO MATCH  — Middle finger flexion (force-only)
  # 44: NO MATCH  — Ring finger flexion (force-only)
  # 45: NO MATCH  — Little finger flexion (force-only)
  # 46: NO MATCH  — Index + middle flexion (force-only)
  # 47: NO MATCH  — Ring + little flexion (force-only)
  # 48: NO MATCH  — Index + middle + ring flexion (force-only)
  # 49: NO MATCH  — Middle + ring + little flexion (force-only)

combined_amputee_analysis:
  databases: ["ninapro_db3", "ninapro_db7"]
  use_amputee_only_from_db7: true
  gesture_space: "DB7"
  total_subjects: 13
  movement_mapping: "db3_to_db7_movement_map"

cross_db_experiments:
  - name: "DB2_to_DB3_transfer"
    source: "ninapro_db2"
    target: "ninapro_db3"

# v32.0: Classifier overrides (legacy, kept for backward compat)
dataset_clf_overrides: {}

parallel_processing: true
n_jobs: 1
max_parallel_workers: 1
disable_cache: true                     # v34.0: ENABLED — avoids re-extraction on repeat runs (huge speedup)
output_dir: './validation_reports'

profiling:
  enabled: false
  log_timings: true
  memory_limit_gb: null